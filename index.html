<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ani-Merge: Enhanced Audio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ecfeff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        
        #ui-right {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            z-index: 10;
        }

        #ui-left {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            z-index: 10;
        }

        .status-panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 10px 20px;
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.2);
            text-align: center;
            border: 2px solid #22d3ee;
            pointer-events: auto;
            min-width: 100px;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 40px;
            border: 6px solid #06b6d4;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            width: 85%;
            max-width: 350px;
        }

        #limit-line {
            position: absolute;
            width: 100%;
            height: 0;
            border-top: 3px dashed #ef4444;
            left: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }

        .limit-label {
            position: absolute;
            right: 10px;
            top: -20px;
            color: #ef4444;
            font-weight: bold;
            font-size: 10px;
            background: rgba(255,255,255,0.8);
            padding: 2px 6px;
            border-radius: 4px;
        }

        #retry-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            border: 2px solid #06b6d4;
            background: rgba(255, 255, 255, 0.92);
            color: #0f172a;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 10px 18px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.26);
            cursor: pointer;
        }

        #retry-btn:active {
            transform: translateX(-50%) scale(0.96);
        }
    </style>
</head>
<body>

    <div id="limit-line"><div class="limit-label">DANGER!</div></div>
    <button id="retry-btn" onclick="location.reload()">Retry</button>

    <!-- UI Left -->
    <div id="ui-left">
        <div class="status-panel">
            <div class="text-[10px] text-cyan-600 font-bold uppercase tracking-widest">High Score</div>
            <div id="high-score" class="text-2xl font-black text-gray-700 leading-tight mt-1">0</div>
        </div>
    </div>

    <!-- UI Right -->
    <div id="ui-right">
        <div class="status-panel">
            <div class="text-[10px] text-cyan-600 font-bold uppercase tracking-widest">Score</div>
            <div id="score" class="text-2xl font-black text-gray-700 leading-tight mt-1">0</div>
        </div>
        <div class="status-panel">
            <div class="text-[10px] text-cyan-600 font-bold uppercase tracking-widest">Next</div>
            <canvas id="next-canvas" width="60" height="60" class="mt-1"></canvas>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over">
        <div class="text-6xl mb-4">🌊</div>
        <h2 class="text-2xl font-black text-gray-800 mb-2">Bowl Full!</h2>
        <p class="text-gray-500 mb-6 font-medium">Your cute animals overflowed.</p>
        <div class="bg-cyan-50 rounded-2xl p-4 mb-8">
            <p id="final-score" class="text-3xl font-black text-cyan-600">0</p>
            <p class="text-cyan-500 text-xs font-bold uppercase mt-1 mb-2">Final Score</p>
            <p id="final-high-score" class="text-sm font-bold text-gray-600 border-t border-cyan-200 pt-2">High Score: 0</p>
        </div>
        <div class="flex flex-col gap-3">
            <button onclick="location.reload()" class="bg-cyan-500 hover:bg-cyan-600 text-white font-black py-4 px-10 rounded-full transform transition active:scale-95 shadow-xl w-full">Play Again</button>
        </div>
    </div>

    <script>
        // ==========================================
        // AUDIO SYSTEM (WEB AUDIO API)
        // ==========================================
        let audioCtx;
        let masterGain; 
        let musicGain;
        let musicFilter;
        let themeTimer = null;
        let themeStep = 0;
        const THEME_BASE_GAIN = 0.222;
        const THEME_BEAT = 0.62;
        const THEME_LOOKAHEAD = 0.35;
        const COZY_THEME = [
            { bass: 48, chord: [60, 64, 67], lead: 72 },
            { bass: 50, chord: [62, 65, 69], lead: 74 },
            { bass: 45, chord: [57, 60, 64], lead: 69 },
            { bass: 47, chord: [59, 62, 65], lead: 71 },
            { bass: 48, chord: [60, 64, 67], lead: 74 },
            { bass: 45, chord: [57, 60, 64], lead: 72 },
            { bass: 43, chord: [55, 59, 62], lead: 67 },
            { bass: 47, chord: [59, 62, 65], lead: 71 },
        ];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Master Gain Node set kepada 10.0 seperti yang diminta
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 10.0; 
                masterGain.connect(audioCtx.destination);

                musicFilter = audioCtx.createBiquadFilter();
                musicFilter.type = 'lowpass';
                musicFilter.frequency.value = 1500;
                musicFilter.Q.value = 0.6;

                musicGain = audioCtx.createGain();
                musicGain.gain.value = 0.0001;
                musicFilter.connect(musicGain);
                musicGain.connect(masterGain);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            startMainTheme();
        }

        function playDropSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            
            // Sweep turun cepat
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(masterGain); 
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Suara Pop dinamis berdasarkan level
        function playPopSound(level) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            
            // Level lebih tinggi = Pitch pop lebih tinggi
            const baseFreq = 300 + (level * 80); 
            osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(masterGain); 
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playBoomSound() {
            if (!audioCtx) return;
            
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; 
            }
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.5);
            
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(masterGain); 
            
            noiseSource.start();
            noiseSource.stop(audioCtx.currentTime + 2);
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            // Suara sedih turun perlahan
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.2);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            
            osc.connect(gain);
            gain.connect(masterGain); 
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        function midiToFreq(midi) {
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        function playThemeVoice(freq, when, duration, type, volume, attack = 0.03, release = 0.25, detune = 0) {
            if (!audioCtx || !musicFilter || !musicGain) return;

            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, when);
            osc.detune.setValueAtTime(detune, when);

            env.gain.setValueAtTime(0.0001, when);
            env.gain.exponentialRampToValueAtTime(volume, when + attack);
            env.gain.exponentialRampToValueAtTime(0.0001, when + duration + release);

            osc.connect(env);
            env.connect(musicFilter);
            osc.start(when);
            osc.stop(when + duration + release + 0.02);
        }

        function scheduleThemeStep(when) {
            const step = COZY_THEME[themeStep % COZY_THEME.length];
            const bar = THEME_BEAT;
            const padDur = bar * 1.8;

            step.chord.forEach((midi, idx) => {
                playThemeVoice(midiToFreq(midi), when, padDur, 'triangle', 0.04, 0.04, 0.32, (idx - 1) * 2);
            });

            playThemeVoice(midiToFreq(step.bass), when, bar * 0.95, 'sine', 0.06, 0.01, 0.2);
            playThemeVoice(midiToFreq(step.bass + 12), when + bar * 0.5, bar * 0.42, 'sine', 0.032, 0.01, 0.16);
            playThemeVoice(midiToFreq(step.lead), when + bar * 0.16, bar * 0.34, 'sine', 0.028, 0.015, 0.16);
            playThemeVoice(midiToFreq(step.lead - 2), when + bar * 0.66, bar * 0.28, 'sine', 0.023, 0.015, 0.15);

            themeStep++;
        }

        function startMainTheme() {
            if (!audioCtx || !musicGain || themeTimer || isGameOver) return;

            const now = audioCtx.currentTime;
            musicGain.gain.cancelScheduledValues(now);
            musicGain.gain.setValueAtTime(Math.max(0.0001, musicGain.gain.value), now);
            musicGain.gain.linearRampToValueAtTime(THEME_BASE_GAIN, now + 0.8);

            let nextNoteTime = now + 0.05;
            themeTimer = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running' || isGameOver) return;
                while (nextNoteTime < audioCtx.currentTime + THEME_LOOKAHEAD) {
                    scheduleThemeStep(nextNoteTime);
                    nextNoteTime += THEME_BEAT;
                }
            }, 100);
        }

        function stopMainTheme(fadeOut = 0.6) {
            if (themeTimer) {
                clearInterval(themeTimer);
                themeTimer = null;
            }
            if (!audioCtx || !musicGain) return;

            const now = audioCtx.currentTime;
            musicGain.gain.cancelScheduledValues(now);
            musicGain.gain.setValueAtTime(Math.max(0.0001, musicGain.gain.value), now);
            musicGain.gain.linearRampToValueAtTime(0.0001, now + fadeOut);
        }

        // ==========================================
        // DATA & GRAFIS VEKTOR
        // ==========================================
        const ANIMALS = [
            { id: 0, radius: 12, color: '#94a3b8', type: 0, score: 2 },
            { id: 1, radius: 18, color: '#fbbf24', type: 1, score: 4 },
            { id: 2, radius: 26, color: '#fca5a5', type: 2, score: 8 },
            { id: 3, radius: 34, color: '#fb923c', type: 3, score: 16 },
            { id: 4, radius: 42, color: '#cbd5e1', type: 4, score: 32 },
            { id: 5, radius: 52, color: '#334155', type: 5, score: 64 },
            { id: 6, radius: 64, color: '#4ade80', type: 6, score: 128 }, 
        ];

        function drawVectorAnimal(ctx, type, radius) {
            ctx.save();

            const cuteStyles = [
                { base: '#94a3b8', highlight: '#cbd5e1', shadow: '#64748b', blush: '#fda4af', inner: '#fecdd3' },
                { base: '#f59e0b', highlight: '#fde68a', shadow: '#d97706', blush: '#fb7185', inner: '#fef3c7' },
                { base: '#fee2e2', highlight: '#fff1f2', shadow: '#fda4af', blush: '#fb7185', inner: '#fbcfe8' },
                { base: '#fb923c', highlight: '#fdba74', shadow: '#ea580c', blush: '#fb7185', inner: '#ffedd5' },
                { base: '#f1f5f9', highlight: '#ffffff', shadow: '#cbd5e1', blush: '#fda4af', inner: '#f8fafc' },
                { base: '#ffffff', highlight: '#f8fafc', shadow: '#d1d5db', blush: '#fda4af', inner: '#e2e8f0' },
                { base: '#4ade80', highlight: '#86efac', shadow: '#22c55e', blush: '#fb7185', inner: '#dcfce7' }
            ];
            const style = cuteStyles[type] || cuteStyles[0];

            const drawEye = (x, y, eyeR) => {
                ctx.fillStyle = '#111827';
                ctx.beginPath();
                ctx.ellipse(x, y, eyeR, eyeR * 1.05, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(x - eyeR * 0.35, y - eyeR * 0.35, eyeR * 0.34, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + eyeR * 0.2, y + eyeR * 0.15, eyeR * 0.14, 0, Math.PI * 2);
                ctx.fill();
            };

            // Back features first so they appear behind the face.
            ctx.fillStyle = style.base;
            if (type === 0 || type === 4) {
                ctx.beginPath(); ctx.arc(-radius * 0.68, -radius * 0.68, radius * 0.38, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.68, -radius * 0.68, radius * 0.38, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = style.inner;
                ctx.beginPath(); ctx.arc(-radius * 0.68, -radius * 0.68, radius * 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.68, -radius * 0.68, radius * 0.2, 0, Math.PI * 2); ctx.fill();
            } else if (type === 2) {
                ctx.beginPath(); ctx.ellipse(-radius * 0.44, -radius * 1.08, radius * 0.21, radius * 0.66, -0.1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(radius * 0.44, -radius * 1.08, radius * 0.21, radius * 0.66, 0.1, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = style.inner;
                ctx.beginPath(); ctx.ellipse(-radius * 0.44, -radius * 1.1, radius * 0.11, radius * 0.45, -0.1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(radius * 0.44, -radius * 1.1, radius * 0.11, radius * 0.45, 0.1, 0, Math.PI * 2); ctx.fill();
            } else if (type === 3) {
                ctx.beginPath(); ctx.moveTo(-radius * 0.84, -radius * 0.3); ctx.lineTo(-radius * 0.46, -radius * 1.16); ctx.lineTo(-radius * 0.08, -radius * 0.76); ctx.fill();
                ctx.beginPath(); ctx.moveTo(radius * 0.84, -radius * 0.3); ctx.lineTo(radius * 0.46, -radius * 1.16); ctx.lineTo(radius * 0.08, -radius * 0.76); ctx.fill();
                ctx.fillStyle = style.inner;
                ctx.beginPath(); ctx.moveTo(-radius * 0.62, -radius * 0.45); ctx.lineTo(-radius * 0.45, -radius * 0.92); ctx.lineTo(-radius * 0.26, -radius * 0.63); ctx.fill();
                ctx.beginPath(); ctx.moveTo(radius * 0.62, -radius * 0.45); ctx.lineTo(radius * 0.45, -radius * 0.92); ctx.lineTo(radius * 0.26, -radius * 0.63); ctx.fill();
            } else if (type === 5) {
                ctx.fillStyle = '#1e293b';
                ctx.beginPath(); ctx.arc(-radius * 0.7, -radius * 0.7, radius * 0.31, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.7, -radius * 0.7, radius * 0.31, 0, Math.PI * 2); ctx.fill();
            } else if (type === 6) {
                ctx.fillStyle = style.highlight;
                ctx.beginPath(); ctx.arc(-radius * 0.42, -radius * 0.7, radius * 0.26, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.42, -radius * 0.7, radius * 0.26, 0, Math.PI * 2); ctx.fill();
            }

            const headGradient = ctx.createRadialGradient(
                -radius * 0.34, -radius * 0.44, radius * 0.14,
                0, 0, radius * 1.12
            );
            headGradient.addColorStop(0, style.highlight);
            headGradient.addColorStop(1, style.base);
            ctx.fillStyle = headGradient;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fill();

            // Soft chin shadow for depth.
            ctx.fillStyle = style.shadow;
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.ellipse(0, radius * 0.34, radius * 0.78, radius * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.95, Math.PI * 1.18, Math.PI * 1.82);
            ctx.strokeStyle = 'rgba(255,255,255,0.52)';
            ctx.lineWidth = Math.max(1.5, radius * 0.09);
            ctx.stroke();

            if (type === 1) {
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath();
                ctx.moveTo(0, -radius * 1.05);
                ctx.lineTo(radius * 0.12, -radius * 0.78);
                ctx.lineTo(-radius * 0.12, -radius * 0.78);
                ctx.closePath();
                ctx.fill();
            }

            if (type === 3) {
                ctx.fillStyle = style.inner;
                ctx.beginPath();
                ctx.ellipse(0, radius * 0.16, radius * 0.45, radius * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            if (type === 5) {
                ctx.fillStyle = '#1e293b';
                ctx.beginPath(); ctx.ellipse(-radius * 0.38, -radius * 0.08, radius * 0.25, radius * 0.2, 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(radius * 0.38, -radius * 0.08, radius * 0.25, radius * 0.2, -0.2, 0, Math.PI * 2); ctx.fill();
            }

            if (type === 1) {
                ctx.fillStyle = '#fb923c';
                ctx.beginPath();
                ctx.moveTo(0, radius * 0.08);
                ctx.lineTo(-radius * 0.12, radius * 0.23);
                ctx.lineTo(radius * 0.12, radius * 0.23);
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.fillStyle = '#fb7185';
                ctx.beginPath();
                ctx.arc(0, radius * 0.14, radius * 0.09, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#374151';
                ctx.lineWidth = Math.max(1.2, radius * 0.045);
                ctx.beginPath();
                ctx.arc(0, radius * 0.2, radius * 0.18, 0.15, Math.PI - 0.15);
                ctx.stroke();
            }

            let eyeY = -radius * 0.08;
            if (type === 6) eyeY = -radius * 0.26;
            if (type === 1) eyeY = -radius * 0.04;
            const eyeX = type === 2 ? radius * 0.33 : radius * 0.37;
            const eyeR = Math.max(1.8, radius * 0.11);
            drawEye(-eyeX, eyeY, eyeR);
            drawEye(eyeX, eyeY, eyeR);

            ctx.fillStyle = style.blush;
            ctx.globalAlpha = 0.38;
            ctx.beginPath(); ctx.ellipse(-radius * 0.58, radius * 0.12, radius * 0.17, radius * 0.12, -0.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(radius * 0.58, radius * 0.12, radius * 0.17, radius * 0.12, 0.2, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;

            if (type === 6) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(-radius * 0.44, -radius * 0.76, radius * 0.07, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.4, -radius * 0.78, radius * 0.07, 0, Math.PI * 2); ctx.fill();
            }

            ctx.restore();
        }

        // ==========================================
        // MESIN FISIKA (MATTER.JS)
        // ==========================================
        const { Engine, Render, World, Bodies, Body, Events, Composite } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.6; 

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        let score = 0;
        let highScore = localStorage.getItem('aniMergeHighScore') || 0;
        document.getElementById('high-score').innerText = highScore;

        let currentNextIndex = 0;
        let currentHeldIndex = 0;
        let isGameOver = false;
        let isGameOverSoundPlayed = false;
        let canDrop = true;
        let gameWidth = window.innerWidth;
        let gameHeight = window.innerHeight;

        let bowlBaseWidth = Math.min(gameWidth * 0.50, 310); 
        let wallThickness = 20;
        let bowlBottomY = gameHeight * 0.90;
        const wallHeight = 310; 
        
        const wallAngle = 15 * (Math.PI / 180);
        const extraWidthAtTop = wallHeight * Math.tan(wallAngle);
        const bowlTopWidth = bowlBaseWidth + (2 * extraWidthAtTop);
        let limitLineY = bowlBottomY - wallHeight + 40;

        document.getElementById('limit-line').style.top = limitLineY + 'px';

        const wallOptions = { isStatic: true, render: { fillStyle: 'transparent' }, label: 'wall', friction: 0.2, restitution: 0.5 };
        const ground = Bodies.rectangle(gameWidth/2, bowlBottomY, bowlBaseWidth, wallThickness, wallOptions);
        const leftWall = Bodies.rectangle((gameWidth/2) - (bowlBaseWidth/2) - (extraWidthAtTop/2), bowlBottomY - (wallHeight/2), wallThickness, wallHeight + 20, { ...wallOptions, angle: -wallAngle });
        const rightWall = Bodies.rectangle((gameWidth/2) + (bowlBaseWidth/2) + (extraWidthAtTop/2), bowlBottomY - (wallHeight/2), wallThickness, wallHeight + 20, { ...wallOptions, angle: wallAngle });
        World.add(engine.world, [ground, leftWall, rightWall]);

        let dropperX = gameWidth / 2;
        let dropY = 100;
        let explosions = [];

        function updateNextUI() {
            const canvas = document.getElementById('next-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,60,60);
            ctx.save();
            ctx.translate(30, 35);
            drawVectorAnimal(ctx, currentNextIndex, ANIMALS[currentNextIndex].radius * 0.6);
            ctx.restore();
        }

        function spawnAnimal(x, y, index, isFalling = true) {
            const config = ANIMALS[index];
            const animal = Bodies.circle(x, y, config.radius, {
                restitution: 0.5,
                friction: 0.3,
                density: 0.002,
                label: 'animal'
            });
            animal.animalIndex = index;
            animal.spawnTime = Date.now(); 
            
            if (isFalling) {
                Body.setVelocity(animal, { x: 0, y: 0 }); 
                Body.setAngularVelocity(animal, (Math.random() - 0.5) * 0.02);
                World.add(engine.world, animal);
            }
            return animal;
        }

        function updateDropper(clientX) {
            if(isGameOver) return;
            const safePadding = 45; 
            let minX = (gameWidth/2) - (bowlTopWidth/2) + safePadding;
            let maxX = (gameWidth/2) + (bowlTopWidth/2) - safePadding;
            dropperX = Math.max(minX, Math.min(maxX, clientX));
        }

        window.addEventListener('mousemove', e => {
            initAudio(); 
            updateDropper(e.clientX);
        });
        
        window.addEventListener('touchmove', e => {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
                updateDropper(e.touches[0].clientX);
            }
        }, { passive: false });

        window.addEventListener('touchstart', () => initAudio(), { once: true });
        window.addEventListener('mousedown', () => initAudio(), { once: true });

        const handleDrop = (e) => {
            if (!canDrop || isGameOver || e.target.tagName === 'BUTTON') return;
            canDrop = false;
            initAudio();
            playDropSound(); 
            
            spawnAnimal(dropperX, dropY, currentHeldIndex);
            currentHeldIndex = currentNextIndex;
            currentNextIndex = Math.floor(Math.random() * 4);
            updateNextUI();
            setTimeout(() => { canDrop = true; }, 600);
        };

        window.addEventListener('mouseup', handleDrop);
        window.addEventListener('touchend', handleDrop);

        function addScore(points) {
            score += points;
            document.getElementById('score').innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('aniMergeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }
        }

        Events.on(engine, 'collisionStart', (event) => {
            if (isGameOver) return;
            event.pairs.forEach(pair => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'animal' && bodyB.label === 'animal' && bodyA.animalIndex === bodyB.animalIndex) {
                    
                    if (bodyA.isMerging || bodyB.isMerging) return;
                    bodyA.isMerging = true;
                    bodyB.isMerging = true;

                    const idx = bodyA.animalIndex;
                    const midX = (bodyA.position.x + bodyB.position.x) / 2;
                    const midY = (bodyA.position.y + bodyB.position.y) / 2;

                    if (idx < ANIMALS.length - 1) {
                        World.remove(engine.world, [bodyA, bodyB]);
                        const newAnimal = spawnAnimal(midX, midY, idx + 1, true); 
                        newAnimal.spawnTime = 0; 
                        addScore(ANIMALS[idx + 1].score);
                        playPopSound(idx); 
                        
                    } else if (idx === ANIMALS.length - 1) {
                        World.remove(engine.world, [bodyA, bodyB]);
                        addScore(ANIMALS[idx].score * 2);
                        explosions.push({ x: midX, y: midY, time: Date.now() });
                        playBoomSound(); 
                    }
                }
            });
        });

        setInterval(() => {
            if (isGameOver) return;
            const bodies = Composite.allBodies(engine.world);
            const now = Date.now();
            let danger = false;
            
            for (let body of bodies) {
                if (body.label === 'animal') {
                    if (body.position.y > gameHeight + 50) {
                        triggerGameOver();
                        return;
                    }

                    if (now - body.spawnTime > 3000) {
                        if (body.position.y < limitLineY) {
                            danger = true;
                            const speed = Math.sqrt(body.velocity.x**2 + body.velocity.y**2);
                            if (speed < 0.15) {
                                triggerGameOver();
                                return;
                            }
                        }
                    }
                }
            }
            document.getElementById('limit-line').style.opacity = danger ? 1 : 0;
        }, 500);

        function triggerGameOver() {
            if(isGameOver) return;
            isGameOver = true;
            stopMainTheme(0.3);
            
            if (!isGameOverSoundPlayed) {
                playGameOverSound(); 
                isGameOverSoundPlayed = true;
            }

            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-high-score').innerText = 'High Score: ' + highScore;
        }

        // --- RENDER ---
        Events.on(render, 'afterRender', () => {
            const ctx = render.context;

            ctx.save();
            ctx.beginPath();
            let bL = (gameWidth/2) - (bowlBaseWidth/2);
            let bR = (gameWidth/2) + (bowlBaseWidth/2);
            let botY = bowlBottomY - 5;
            let tL = bL - extraWidthAtTop;
            let tR = bR + extraWidthAtTop;

            ctx.moveTo(tL, limitLineY - 10);
            ctx.lineTo(bL, botY - 20);
            ctx.quadraticCurveTo(bL, botY, bL + 20, botY);
            ctx.lineTo(bR - 20, botY);
            ctx.quadraticCurveTo(bR, botY, bR, botY - 20);
            ctx.lineTo(tR, limitLineY - 10);

            ctx.lineWidth = 14;
            ctx.strokeStyle = '#00acc1'; 
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 172, 193, 0.25)'; 
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(tR - 20, limitLineY + 30);
            ctx.lineTo(bR - 15, botY - 30);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.stroke();
            ctx.restore();

            if (!isGameOver && canDrop) {
                ctx.save();
                ctx.translate(dropperX, dropY);
                
                ctx.beginPath();
                ctx.setLineDash([8, 8]);
                ctx.moveTo(0, 0);
                ctx.lineTo(0, gameHeight);
                ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)'; 
                ctx.lineWidth = 2;
                ctx.stroke();
                
                drawVectorAnimal(ctx, currentHeldIndex, ANIMALS[currentHeldIndex].radius);
                ctx.restore();
            }

            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'animal' && !body.isMerging) {
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    drawVectorAnimal(ctx, body.animalIndex, ANIMALS[body.animalIndex].radius);
                    ctx.restore();
                }
            });

            const now = Date.now();
            explosions = explosions.filter(exp => now - exp.time < 1200); 
            
            explosions.forEach(exp => {
                let progress = (now - exp.time) / 1200;
                ctx.save();
                ctx.translate(exp.x, exp.y - (progress * 100)); 
                ctx.globalAlpha = 1 - progress; 
                
                ctx.font = "900 42px 'Segoe UI', Arial, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                ctx.lineWidth = 6;
                ctx.strokeStyle = "white";
                ctx.strokeText("BOOM!", 0, 0);
                ctx.fillStyle = "#ff5722"; 
                ctx.fillText("BOOM!", 0, 0);
                ctx.restore();
            });
        });

        // --- DELTA TIME LOOP ---
        let lastTime = 0;
        let accumulator = 0;
        const timeStep = 1000 / 60; 

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            if (!lastTime) { lastTime = time; return; }
            let deltaTime = time - lastTime;
            lastTime = time;
            
            if (deltaTime > 100) deltaTime = timeStep;
            accumulator += deltaTime;
            
            while (accumulator >= timeStep) {
                Engine.update(engine, timeStep);
                accumulator -= timeStep;
            }
            Render.world(render);
        }

        currentHeldIndex = Math.floor(Math.random() * 3);
        currentNextIndex = Math.floor(Math.random() * 3);
        updateNextUI();
        requestAnimationFrame(gameLoop);

        window.addEventListener('resize', () => location.reload());

    </script>
</body>
</html>
